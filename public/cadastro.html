<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar conta | MeuFinanças</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen flex items-center justify-center px-6">

  <div class="bg-white w-full max-w-md rounded-3xl shadow-xl p-8 border border-slate-100">
    <h1 class="text-3xl font-bold text-slate-900">Criar conta</h1>
    <p class="text-slate-500 mt-2">Comece grátis e organize sua vida financeira.</p>

    <form id="formCadastro" class="mt-8 space-y-4">
      <input id="nome" type="text" placeholder="Seu nome"
        class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500" />

      <input id="email" type="email" placeholder="Seu email"
        class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500" />

      <input id="senha" type="password" placeholder="Sua senha"
        class="w-full border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-emerald-500" />

      <button class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">
        Cadastrar
      </button>
    </form>

    <p id="mensagem" class="mt-4 text-sm"></p>

    <p class="text-sm text-slate-500 mt-6">
      Já tem conta?
      <a href="/login.html" class="text-emerald-600 font-bold">Entrar</a>
    </p>
  </div>

  <script src="./js/cadastro.js"></script>
</body>
</html>
