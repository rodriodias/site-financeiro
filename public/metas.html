<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Metas financeiras | MeuFinanças</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen">

  <div class="flex min-h-screen">

    <div id="sidebar"></div>

    <main class="flex-1">

      <div id="topbar"></div>

      <section class="p-6 md:p-10">

        <div class="grid lg:grid-cols-3 gap-6">

          <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">

            <h2 class="text-xl font-bold text-slate-900">
              Nova meta
            </h2>

            <form id="formMeta" class="mt-6 space-y-4">

              <input id="metaId" type="hidden" />

              <input
                id="titulo"
                type="text"
                placeholder="Ex: Reserva de emergência"
                class="w-full border border-slate-200 rounded-xl px-4 py-3"
              />

              <input
                id="valor_meta"
                type="number"
                step="0.01"
                placeholder="Valor da meta"
                class="w-full border border-slate-200 rounded-xl px-4 py-3"
              />

              <input
                id="valor_atual"
                type="number"
                step="0.01"
                placeholder="Valor atual"
                class="w-full border border-slate-200 rounded-xl px-4 py-3"
              />

              <div>

                <label
                  for="prazo"
                  class="block text-sm font-semibold text-slate-700 mb-2">

                  Data limite da meta

                </label>

                <input
                  id="prazo"
                  type="date"
                  class="w-full border border-slate-200 rounded-xl px-4 py-3"
                />

                <p class="text-xs text-slate-500 mt-1">
                  Informe até quando pretende alcançar essa meta.
                </p>

              </div>

              <select
                id="categoria_relacionada"
                class="w-full border border-slate-200 rounded-xl px-4 py-3">

                <option value="">
                  Categoria relacionada
                </option>

              </select>

              <select
                id="status"
                class="w-full border border-slate-200 rounded-xl px-4 py-3">

                <option value="ativa">
                  Meta ativa
                </option>

                <option value="concluida">
                  Meta concluída
                </option>

                <option value="pausada">
                  Meta pausada
                </option>

              </select>

              <button
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold">

                Salvar meta

              </button>

              <button
                id="botaoCancelarEdicao"
                type="button"
                class="hidden w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-bold">

                Cancelar edição

              </button>

            </form>

            <p id="mensagem" class="mt-4 text-sm"></p>

          </div>

          <div class="lg:col-span-2">

            <div id="listaMetas" class="grid md:grid-cols-2 gap-6">

              <p class="text-sm text-slate-500">
                Carregando metas...
              </p>

            </div>

          </div>

        </div>

      </section>

    </main>

  </div>

  <script src="/assets/components/sidebar.js"></script>

<script src="/assets/components/topbar.js"></script>

<script src="/assets/components/notificacoes.js"></script>

<script src="/js/metas.js"></script>

  <script>
    document.getElementById('sidebar').innerHTML =
      criarSidebar('metas');

    document.getElementById('topbar').innerHTML =
      criarTopbar(
        'Metas financeiras',
        'Organize seus objetivos financeiros.'
      );
  </script>

</body>
</html>
