<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Orçamentos | MeuFinanças</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen">
  <div class="flex min-h-screen">

    <div id="sidebar"></div>

    <main class="flex-1">

      <div id="topbar"></div>

      <section class="p-6 md:p-10">

        <div class="grid lg:grid-cols-3 gap-6">

          <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">

            <h2 class="text-xl font-bold text-slate-900">
              Novo orçamento
            </h2>

            <form id="formOrcamento" class="mt-6 space-y-4">

              <select
                id="categoria"
                class="w-full border border-slate-200 rounded-xl px-4 py-3">
                <option value="">Selecione uma categoria</option>
              </select>

              <input
                id="valor_limite"
                type="number"
                step="0.01"
                placeholder="Valor limite"
                class="w-full border border-slate-200 rounded-xl px-4 py-3"
              />

              <div class="grid grid-cols-2 gap-4">

                <select
                  id="mes"
                  class="w-full border border-slate-200 rounded-xl px-4 py-3">
                  <option value="1">Janeiro</option>
                  <option value="2">Fevereiro</option>
                  <option value="3">Março</option>
                  <option value="4">Abril</option>
                  <option value="5">Maio</option>
                  <option value="6">Junho</option>
                  <option value="7">Julho</option>
                  <option value="8">Agosto</option>
                  <option value="9">Setembro</option>
                  <option value="10">Outubro</option>
                  <option value="11">Novembro</option>
                  <option value="12">Dezembro</option>
                </select>

                <input
                  id="ano"
                  type="number"
                  placeholder="Ano"
                  class="w-full border border-slate-200 rounded-xl px-4 py-3"
                />

              </div>

              <button
                class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold">
                Salvar orçamento
              </button>

            </form>

            <p id="mensagem" class="mt-4 text-sm"></p>

          </div>

          <div class="lg:col-span-2">

            <div id="listaOrcamentos" class="grid md:grid-cols-2 gap-6">
              <p class="text-sm text-slate-500">
                Carregando orçamentos...
              </p>
            </div>

          </div>

        </div>

      </section>

    </main>

  </div>

  <script src="/assets/components/sidebar.js"></script>
  <script src="/assets/components/topbar.js"></script>
  <script src="/assets/components/notificacoes.js"></script>
  <script src="/js/orcamentos.js"></script>

  <script>
    document.getElementById('sidebar').innerHTML =
      criarSidebar('orcamentos');

    document.getElementById('topbar').innerHTML =
      criarTopbar(
        'Orçamentos mensais',
        'Defina limites de gastos por categoria.'
      );
  </script>

</body>
</html>
