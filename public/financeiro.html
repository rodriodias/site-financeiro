<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Minhas finanças | MeuFinanças</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen">

  <div class="flex min-h-screen">

    <div id="sidebar"></div>

    <main class="flex-1">

      <header class="bg-white border-b border-slate-100 px-6 py-4">
        <h1 class="text-2xl font-bold text-slate-900">
          Minhas finanças
        </h1>
        <p class="text-sm text-slate-500">
          Registre receitas, despesas e acompanhe seu saldo.
        </p>
      </header>

      <section class="p-6 md:p-10">

        <div class="grid md:grid-cols-3 gap-6">
          <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
            <p class="text-sm text-slate-500">Receitas</p>
            <strong id="totalReceitas" class="block mt-3 text-3xl text-emerald-600">R$ 0,00</strong>
          </div>

          <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
            <p class="text-sm text-slate-500">Despesas</p>
            <strong id="totalDespesas" class="block mt-3 text-3xl text-red-500">R$ 0,00</strong>
          </div>

          <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
            <p class="text-sm text-slate-500">Saldo</p>
            <strong id="saldoFinal" class="block mt-3 text-3xl text-slate-900">R$ 0,00</strong>
          </div>
        </div>

        <div class="grid lg:grid-cols-3 gap-6 mt-8">

          <div class="bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
            <h2 class="text-xl font-bold text-slate-900">
              Nova transação
            </h2>

            <form id="formTransacao" class="mt-6 space-y-4">

              <select id="tipo" class="w-full border border-slate-200 rounded-xl px-4 py-3">
                <option value="receita">Receita</option>
                <option value="despesa">Despesa</option>
              </select>

              <input id="valor" type="number" step="0.01" placeholder="Valor"
                class="w-full border border-slate-200 rounded-xl px-4 py-3" />

              <select id="categoria" class="w-full border border-slate-200 rounded-xl px-4 py-3">
  <option value="">Selecione uma categoria</option>
  <option value="Casa">Casa</option>
  <option value="Alimentação">Alimentação</option>
  <option value="Transporte">Transporte</option>
  <option value="Saúde">Saúde</option>
  <option value="Educação">Educação</option>
  <option value="Lazer">Lazer</option>
  <option value="Mercado">Mercado</option>
  <option value="Contas fixas">Contas fixas</option>
  <option value="Trabalho">Trabalho</option>
  <option value="Investimentos">Investimentos</option>
  <option value="Dívidas">Dívidas</option>
  <option value="Outros">Outros</option>
  <option value="nova">+ Criar nova categoria</option>
</select>

<input id="novaCategoria" type="text" placeholder="Digite a nova categoria"
  class="hidden w-full border border-slate-200 rounded-xl px-4 py-3" />

<input id="descricao" type="text" placeholder="Nome da transação. Ex: Aluguel, salário, mercado"
  class="w-full border border-slate-200 rounded-xl px-4 py-3" />

<input id="data_transacao" type="datetime-local"
  class="w-full border border-slate-200 rounded-xl px-4 py-3" />

              <button class="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-3 rounded-xl font-bold">
                Salvar transação
              </button>
            </form>

            <p id="mensagem" class="mt-4 text-sm"></p>
          </div>

          <div class="lg:col-span-2 bg-white rounded-3xl p-6 border border-slate-100 shadow-sm">
            <h2 class="text-xl font-bold text-slate-900">
              Histórico
            </h2>

            <div id="listaTransacoes" class="mt-6 space-y-3">
              <p class="text-sm text-slate-500">Carregando transações...</p>
            </div>
          </div>

        </div>

      </section>

    </main>

  </div>

  <script src="/assets/components/sidebar.js"></script>
  <script src="/js/financeiro.js"></script>

  <script>
    document.getElementById('sidebar').innerHTML =
      criarSidebar('financeiro');
  </script>

</body>
</html>
